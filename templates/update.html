<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Product</title>
    <style>
        /* Reuse General Styles */
body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #f8f9fa; /* Consistent light grey */
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center; /* Centers everything */
}

/* Page Heading */
h2 {
    color: #222;
    font-weight: 700;
    margin-bottom: 25px;
    font-size: 1.8rem;
    letter-spacing: -0.5px;
}

/* Form Container Card */
form {
    background: #ffffff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 500px; 
    border: 1px solid #eee;
}

/* Labels (The <p> tags) */
form p {
    font-weight: 600;
    margin-bottom: 8px;
    color: #555;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

/* Inputs and Textarea Styling */
input[type="text"], 
textarea {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 25px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    box-sizing: border-box; /* Crucial for layout */
    background-color: #fff;
    transition: all 0.3s ease;
    outline: none;
}

/* Interaction States */
input[type="text"]:focus, 
textarea:focus {
    border-color: #ffc107; /* Updated to yellow-gold to signify 'Edit' mode */
    box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.15);
}

/* Save Changes Button */
form button[type="submit"] {
    width: 100%;
    padding: 14px;
    background-color: #ffc107; /* Matches the 'Edit' button color from Home */
    color: #212529;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s active;
}

form button[type="submit"]:hover {
    background-color: #e0a800;
}

form button[type="submit"]:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>
    <h2>Update Product</h2>
    
    <form action="/update/{{ product['product_id'] }}" method="POST">
        <p>Title</p>
        <input type="text" name="Title" value="{{ product['title'] }}">
        <br>
        
        <p>Content</p>
        <textarea name="Content" cols="30" rows="5">{{ product['content'] }}</textarea>
        <br>
        
        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
